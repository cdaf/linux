# If stages is not defined in the .gitlab-ci.yml file, the default pipeline stages are:
#stages:
#  - .pre
#  - build
#  - test
#  - deploy
#  - .post

CI:
  stage: build

  # To use native container runner with CDAF pre-installed
  image: cdaf/linux
  script: |
    if [ -z "$CI_COMMIT_TAG" ]; then
      entry.sh ${CI_PIPELINE_IID} ${CI_COMMIT_BRANCH}
    else
      echo "Release Tag Created: $CI_COMMIT_TAG"
    fi
  # Self-hosted Runner
  # tags:
  #   - bash

  # Latest Published Release
  # script: |
  #   curl --silent https://cdaf.io/static/app/downloads/cdaf.sh | bash -
  #   ./automation/entry.sh ${CI_BUILD_ID} ${CI_BUILD_REF_NAME}

  # Edge Implementation 
  #  script: |
  #    curl -s https://raw.githubusercontent.com/cdaf/linux/master/install.sh | bash -
  #    ./automation/entry.sh ${CI_BUILD_ID} ${CI_BUILD_REF_NAME}

  # In-source Implementation 
  #  script: "automation/entry.sh ${CI_BUILD_ID} ${CI_BUILD_REF_NAME}"

  artifacts:
    paths:
      - release.sh
    reports:
      junit: "**/test-results/*.xml"
      coverage_report:
        coverage_format: cobertura  # or jacoco
        path: "**/coverage/*.xml"
  coverage: '/All files.*?\|.*?(\d+\.\d+)%/'       # ← Add this for % display

TEST:
  stage: test
  tags:
    - bash
  script: |
    ./release.sh ${CI_JOB_NAME} ${CI_PIPELINE_ID}
  dependencies:
    - CI
  only:
    - main

# Commented lines are support for semver setting release
